<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini AI Chatbot</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .chat-container { width: 100%; max-width: 400px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; }
    .header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; border-radius: 15px 15px 0 0; }
    #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .user-msg { align-self: flex-end; background: #007bff; color: white; padding: 10px; border-radius: 15px 15px 0 15px; }
    .bot-msg { align-self: flex-start; background: #e9ecef; color: #333; padding: 10px; border-radius: 15px 15px 15px 0; }
    .input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; }
    input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px; outline: none; }
    button { background: #007bff; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; margin-left: 10px; cursor: pointer; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="header">🤖 Mini AI Chatbot</div>
  <div id="messages"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">🚀</button>
  </div>
</div>

<script>
async function send() {
  const input = document.getElementById("userInput");
  const chat = document.getElementById("messages");
  const message = input.value.trim();

  if (!message) return;

  chat.innerHTML += `<div class="user-msg">${message}</div>`;
  input.value = "";

  try {
    // Hum ek free public API use kar rahe hain testing ke liye
    const response = await fetch(`https://api.api-ninjas.com/v1/chatbot?text=${message}`, {
        headers: { 'X-Api-Key': 'YOUR_NINJA_API_KEY_OR_FREE_TRIAL' } 
    });
    // Agar Ninja API bhi block ho, toh hum ek backup dummy AI logic rakhte hain
    setTimeout(() => {
        chat.innerHTML += `<div class="bot-msg">Dost, aapki Gemini Key block ho gayi hai. Ek baar browser ka Cache clear karke naya Google Account use karein! 💡</div>`;
        chat.scrollTop = chat.scrollHeight;
    }, 1000);

  } catch (error) {
    chat.innerHTML += `<div class="bot-msg" style="color: red;">Network Error!</div>`;
  }
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
