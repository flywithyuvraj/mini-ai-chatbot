<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini AI Chatbot</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .chat-container { width: 100%; max-width: 400px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; height: 90vh; }
    .header { background: #007bff; color: white; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
    #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #ffffff; }
    .user-msg { align-self: flex-end; background: #007bff; color: white; padding: 8px 12px; border-radius: 15px 15px 0 15px; max-width: 80%; }
    .bot-msg { align-self: flex-start; background: #e9ecef; color: #333; padding: 8px 12px; border-radius: 15px 15px 15px 0; max-width: 80%; line-height: 1.4; }
    .input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; background: #fff; }
    input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none; }
    button { background: #007bff; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; margin-left: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    #loading { font-style: italic; color: #888; font-size: 0.9rem; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="header">🤖 Mini AI Chatbot</div>
  <div id="messages"></div>
  <div id="loading-area"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Kuch bhi puchiye..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">🚀</button>
  </div>
</div>

<script>
async function send() {
  const input = document.getElementById("userInput");
  const chat = document.getElementById("messages");
  const loader = document.getElementById("loading-area");
  const message = input.value.trim();

  if (!message) return;

  // 1. User ka message dikhao
  chat.innerHTML += `<div class="user-msg">${message}</div>`;
  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  // 2. Loading dikhao
  loader.innerHTML = `<div id="loading" style="padding-left: 15px;">Bot soch raha hai... 🤔</div>`;

  // 3. API Details
  const apiKey = "AIzaSyAWUSznUOoT2tMyIZGJEIal-5tgYp9PzIs"; 
  const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=" + apiKey;

  try {
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: message }] }]
      })
    });

    const data = await response.json();
    loader.innerHTML = ""; // Loading hatao

    if (data.error) {
      chat.innerHTML += `<div class="bot-msg" style="color: red;"><b>API Error:</b> ${data.error.message}</div>`;
    } else {
      const botReply = data.candidates[0].content.parts[0].text;
      chat.innerHTML += `<div class="bot-msg">${botReply.replace(/\n/g, "<br>")}</div>`;
    }
  } catch (error) {
    loader.innerHTML = "";
    chat.innerHTML += `<div class="bot-msg" style="color: red;"><b>App Error:</b> Connection failed!</div>`;
  }
  
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
