<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini AI Chatbot</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .chat-card { width: 100%; max-width: 400px; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
        .header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-window { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; word-wrap: break-word; }
        .user { align-self: flex-end; background: #007bff; color: white; }
        .bot { align-self: flex-start; background: #e9ecef; color: #333; }
        .input-box { display: flex; padding: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; border: 1px solid #ccc; border-radius: 20px; padding: 8px 15px; outline: none; }
        button { background: #007bff; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; margin-left: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="header">🤖 AI Chatbot</div>
    <div id="chat-window"></div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Ask me something...">
        <button onclick="send()">🚀</button>
    </div>
</div>

<script>
async function send() {
    const input = document.getElementById("userInput");
    const chat = document.getElementById("chat-window");
    const text = input.value.trim();
    if (!text) return;

    chat.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";
    
    // Loading indicator
    const loadingId = "load-" + Date.now();
    chat.innerHTML += `<div class="msg bot" id="${loadingId}">...</div>`;
    chat.scrollTop = chat.scrollHeight;

    // IMPORTANT: Yahan apni naye account wali API Key dalo
    const apiKey = "AIzaSyC_OCHj5YDRRzarQGANsu6HxdNXT9yucdk";
    
    // Sabse stable URL format
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
        });

        const data = await response.json();
        document.getElementById(loadingId).remove();

        if (data.error) {
            chat.innerHTML += `<div class="msg bot" style="color:red">Error: ${data.error.message}</div>`;
        } else {
            const reply = data.candidates[0].content.parts[0].text;
            chat.innerHTML += `<div class="msg bot">${reply.replace(/\n/g, '<br>')}</div>`;
        }
    } catch (e) {
        document.getElementById(loadingId).innerText = "Connection Error! Check Internet.";
    }
    chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
